<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Guna's Lathe Works</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
  <div class="logo"><a href="index.html">⚙ Guna's Lathe Works</a></div>
  <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="products.html">Products</a></li></ul>
  <div class="auth-buttons"><div class="cart-icon-container" id="cartIcon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span id="cartCount" class="cart-count">0</span></div></div>
  <div class="hamburger"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
</nav>
<div class="page-content">
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><h2>⚙ Guna's Lathe Works</h2><p>Precision Machining & Fabrication</p></div>
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your account</p>
    <form id="loginForm">
      <div class="form-group"><label>Email Address</label><input type="email" id="loginEmail" placeholder="Enter your email" required autocomplete="email"></div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-toggle">
          <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
          <span class="toggle-eye" onclick="togglePwd('loginPassword',this)">👁</span>
        </div>
      </div>
      <div style="text-align:right;margin-bottom:20px;"><a href="#" style="font-size:13px;color:var(--accent);">Forgot password?</a></div>
      <button type="submit" class="btn-auth-submit" id="loginBtn">Sign In</button>
    </form>
    <div class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></div>
    <div style="margin-top:20px;padding:14px;background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.2);border-radius:var(--radius);font-size:12px;color:var(--text-muted);">
      <strong style="color:var(--accent);">Admin:</strong> admin@gunalathe.com / Admin@1234
    </div>
  </div>
</div>
</div>
<script src="config.js"></script>
<script>
function togglePwd(id, el) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  el.textContent = inp.type === 'password' ? '👁' : '🙈';
}
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in...'; btn.disabled = true;
  try {
    const data = await apiRequest(API_ENDPOINTS.login, { method: 'POST', body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value }) });
    localStorage.setItem('authToken', data.token);
    localStorage.setItem('userData', JSON.stringify(data.user));
    showToast('Login successful! Welcome back.');
    setTimeout(() => {
      const redirect = new URLSearchParams(window.location.search).get('redirect') || (data.user.role === 'admin' ? 'admin/index.html' : 'index.html');
      window.location.href = redirect;
    }, 800);
  } catch(e) {
    showToast(e.message || 'Login failed', 'error');
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
});
</script>
</body>
</html>
