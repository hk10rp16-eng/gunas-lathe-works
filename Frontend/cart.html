<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart | Guna's Lathe Works</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
  <div class="logo"><a href="index.html">⚙ Guna's Lathe Works</a></div>
  <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="products.html">Products</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li></ul>
  <div class="auth-buttons">
    <div class="cart-icon-container" id="cartIcon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span id="cartCount" class="cart-count">0</span></div>
    <a href="login.html" class="btn-auth btn-login">Login</a><a href="signup.html" class="btn-auth btn-signup">Sign Up</a>
    <div class="user-info" style="display:none;"><span class="welcome-text">Hi, <span id="userName"></span></span><button class="btn-logout" id="logoutBtn">Logout</button></div>
  </div>
  <div class="hamburger"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
</nav>
<div class="page-content">
<div class="breadcrumb"><a href="index.html">Home</a><span>›</span>Shopping Cart</div>
<div class="cart-page">
  <h1 style="font-size:22px;font-weight:800;margin-bottom:24px;">🛒 Shopping Cart</h1>
  <div class="cart-layout">
    <div>
      <div class="cart-items-card">
        <div class="cart-card-header">Cart Items (<span id="itemCount">0</span>)</div>
        <div id="cartItemsContainer"></div>
      </div>
      <a href="products.html" class="continue-shopping" style="margin-top:16px;display:inline-block;color:var(--accent);font-size:13px;">← Continue Shopping</a>
    </div>
    <div class="order-summary-sticky">
      <div class="cart-summary-card">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
        <div class="summary-row"><span>GST (18%)</span><span id="gstAmount">₹0</span></div>
        <div class="summary-row"><span>Shipping</span><span id="shippingAmount">₹150</span></div>
        <div class="summary-row total"><span>Grand Total</span><span id="grandTotal">₹0</span></div>
        <button class="btn-checkout" id="checkoutBtn" onclick="proceedToCheckout()">Proceed to Checkout</button>
        <p style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:10px;">Free shipping on orders above ₹5,000</p>
      </div>
    </div>
  </div>
</div>
</div>
<script src="config.js"></script>
<script>
let cart = getCart();

function renderCart() {
  const container = document.getElementById('cartItemsContainer');
  cart = getCart();
  document.getElementById('itemCount').textContent = cart.length;
  saveCart(cart);
  updateCartBadge();

  if (cart.length === 0) {
    container.innerHTML = `<div class="empty-cart-msg"><div class="empty-icon">🛒</div><h3>Your cart is empty</h3><p>Browse our products and add items to your cart.</p><a href="products.html" class="btn-primary" style="display:inline-block;margin-top:16px;font-size:13px;padding:10px 24px;">Shop Now</a></div>`;
    document.getElementById('checkoutBtn').disabled = true;
    updateTotals(0);
    return;
  }

  document.getElementById('checkoutBtn').disabled = false;
  container.innerHTML = cart.map((item, i) => `
    <div class="cart-item">
      <img src="${item.image}" alt="${item.name}" class="cart-item-img" onerror="this.src='Assets/lathemachine.jpg'">
      <div class="cart-item-details">
        <div class="cart-item-title">${item.name}</div>
        <div class="cart-item-price">${formatCurrency(item.price)}</div>
        <div class="cart-item-quantity">
          <button class="qty-btn" onclick="changeItemQty(${i}, -1)">−</button>
          <span>${item.quantity}</span>
          <button class="qty-btn" onclick="changeItemQty(${i}, 1)">+</button>
          <span class="cart-item-remove" onclick="removeItem(${i})">Remove</span>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Item Total: ${formatCurrency(item.price * item.quantity)}</div>
      </div>
    </div>`).join('');

  const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  updateTotals(subtotal);
}

function updateTotals(subtotal) {
  const gst = Math.round(subtotal * 0.18);
  const shipping = subtotal >= 5000 ? 0 : (subtotal > 0 ? 150 : 0);
  const grand = subtotal + gst + shipping;
  document.getElementById('subtotal').textContent = formatCurrency(subtotal);
  document.getElementById('gstAmount').textContent = formatCurrency(gst);
  document.getElementById('shippingAmount').textContent = shipping === 0 ? 'Free' : formatCurrency(shipping);
  document.getElementById('grandTotal').textContent = formatCurrency(grand);
}

function changeItemQty(idx, delta) {
  if (cart[idx].quantity + delta < 1) return;
  cart[idx].quantity += delta;
  saveCart(cart);
  renderCart();
}

function removeItem(idx) {
  cart.splice(idx, 1);
  saveCart(cart);
  renderCart();
  showToast('Item removed from cart');
}

function proceedToCheckout() {
  const user = getAuthUser();
  if (!user) { showToast('Please login to checkout', 'error'); setTimeout(() => window.location.href = 'login.html', 1000); return; }
  window.location.href = 'checkout.html';
}

renderCart();
</script>
</body>
</html>
