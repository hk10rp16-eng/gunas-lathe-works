<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Products | Admin</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">⚙ Admin Panel</div>
    <nav>
      <a class="admin-nav-item" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>Dashboard</a>
      <a class="admin-nav-item active" href="products.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>Products</a>
      <a class="admin-nav-item" href="orders.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>Orders</a>
      <a class="admin-nav-item" href="customers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>Customers</a>
      <a class="admin-nav-item" href="reviews.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>Reviews</a>
      <a class="admin-nav-item" href="../index.html" style="margin-top:20px;border-top:1px solid var(--border);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>View Site</a>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-header"><h1>Products</h1><p>Manage your product catalog</p></div>
    <div class="admin-table-card">
      <div class="admin-table-header">
        <h3 id="productCount">All Products</h3>
        <button class="btn-add-product" onclick="openModal()">+ Add Product</button>
      </div>
      <div style="overflow-x:auto;"><table class="admin-table">
        <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="productsBody"><tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-muted);">Loading...</td></tr></tbody>
      </table></div>
    </div>
  </main>
</div>
<!-- Product Modal -->
<div class="modal-overlay hidden" id="productModal">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">Add Product</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <input type="hidden" id="editProductId">
      <div class="form-group"><label>Product Name *</label><input type="text" id="pName" placeholder="Product name"></div>
      <div class="form-group"><label>Short Description</label><input type="text" id="pShortDesc" placeholder="Brief description"></div>
      <div class="form-group"><label>Full Description *</label><textarea id="pDesc" rows="4" placeholder="Detailed description"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Price (₹) *</label><input type="number" id="pPrice" placeholder="0" min="0"></div>
        <div class="form-group"><label>Original Price (₹)</label><input type="number" id="pOrigPrice" placeholder="0" min="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Category *</label>
          <select id="pCategory">
            <option>Lathe Components</option><option>Welding</option><option>Fabrication</option><option>CNC Parts</option><option>Custom</option><option>Other</option>
          </select>
        </div>
        <div class="form-group"><label>Material</label><input type="text" id="pMaterial" placeholder="e.g. Steel, Bronze"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Stock Quantity</label><input type="number" id="pStock" placeholder="100" min="0"></div>
        <div class="form-group"><label>Image URL / Path</label><input type="text" id="pImage" placeholder="Assets/product.jpg"></div>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="pFeatured" style="width:16px;height:16px;accent-color:var(--accent);">
        <label for="pFeatured" style="margin:0;font-size:14px;font-weight:500;color:var(--text-primary);">Featured Product (shown on homepage)</label>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal()" style="padding:9px 20px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-primary);font-size:14px;cursor:pointer;">Cancel</button>
      <button class="btn-add-product" id="saveProductBtn" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>
<script src="../config.js"></script>
<script>
async function init() {
  if (!getAuthUser() || getAuthUser().role !== 'admin') { window.location.href = '../login.html'; return; }
  loadProducts();
}
async function loadProducts() {
  try {
    const data = await apiRequest(API_ENDPOINTS.adminProducts);
    const products = data.products || [];
    document.getElementById('productCount').textContent = `All Products (${products.length})`;
    document.getElementById('productsBody').innerHTML = products.length > 0
      ? products.map(p => `<tr>
          <td><img src="${p.images[0]||'../Assets/lathemachine.jpg'}" style="width:50px;height:50px;object-fit:cover;border-radius:6px;" onerror="this.src='../Assets/lathemachine.jpg'"></td>
          <td><strong>${p.name}</strong></td>
          <td>${p.category}</td>
          <td><strong>${formatCurrency(p.price)}</strong></td>
          <td>${p.stock}</td>
          <td><span class="status-badge ${p.isActive?'delivered':'cancelled'}">${p.isActive?'Active':'Inactive'}</span></td>
          <td>
            <button class="btn-admin-action btn-edit" onclick='editProduct(${JSON.stringify(p)})'>Edit</button>
            <button class="btn-admin-action btn-delete" onclick="deleteProduct('${p._id}')">Delete</button>
          </td>
        </tr>`).join('')
      : '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-muted);">No products found. <a href="#" onclick="openModal()" style="color:var(--accent);">Add your first product</a></td></tr>';
  } catch(e) {
    document.getElementById('productsBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-muted);">Backend offline - run seed.js first</td></tr>';
  }
}
function openModal(reset = true) {
  if (reset) { document.getElementById('modalTitle').textContent = 'Add Product'; document.getElementById('editProductId').value=''; document.getElementById('pName').value=''; document.getElementById('pDesc').value=''; document.getElementById('pShortDesc').value=''; document.getElementById('pPrice').value=''; document.getElementById('pOrigPrice').value=''; document.getElementById('pStock').value=100; document.getElementById('pImage').value=''; document.getElementById('pFeatured').checked=false; }
  document.getElementById('productModal').classList.remove('hidden');
}
function closeModal() { document.getElementById('productModal').classList.add('hidden'); }
function editProduct(p) {
  document.getElementById('modalTitle').textContent = 'Edit Product';
  document.getElementById('editProductId').value = p._id;
  document.getElementById('pName').value = p.name;
  document.getElementById('pDesc').value = p.description;
  document.getElementById('pShortDesc').value = p.shortDescription || '';
  document.getElementById('pPrice').value = p.price;
  document.getElementById('pOrigPrice').value = p.originalPrice || '';
  document.getElementById('pCategory').value = p.category;
  document.getElementById('pMaterial').value = p.material || '';
  document.getElementById('pStock').value = p.stock;
  document.getElementById('pImage').value = (p.images && p.images[0]) || '';
  document.getElementById('pFeatured').checked = p.isFeatured;
  openModal(false);
}
async function saveProduct() {
  const id = document.getElementById('editProductId').value;
  const name = document.getElementById('pName').value.trim();
  const description = document.getElementById('pDesc').value.trim();
  const price = parseFloat(document.getElementById('pPrice').value);
  if (!name || !description || !price) { showToast('Name, description and price are required', 'error'); return; }
  const body = {
    name, description, price,
    shortDescription: document.getElementById('pShortDesc').value,
    originalPrice: parseFloat(document.getElementById('pOrigPrice').value) || undefined,
    category: document.getElementById('pCategory').value,
    material: document.getElementById('pMaterial').value,
    stock: parseInt(document.getElementById('pStock').value) || 100,
    images: [document.getElementById('pImage').value || 'Assets/lathemachine.jpg'],
    isFeatured: document.getElementById('pFeatured').checked
  };
  const btn = document.getElementById('saveProductBtn');
  btn.textContent = 'Saving...'; btn.disabled = true;
  try {
    if (id) { await apiRequest(`${API_ENDPOINTS.products}/${id}`, { method: 'PUT', body: JSON.stringify(body) }); showToast('Product updated!'); }
    else { await apiRequest(API_ENDPOINTS.products, { method: 'POST', body: JSON.stringify(body) }); showToast('Product added!'); }
    closeModal(); loadProducts();
  } catch(e) { showToast(e.message || 'Failed to save', 'error'); }
  finally { btn.textContent = 'Save Product'; btn.disabled = false; }
}
async function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  try { await apiRequest(`${API_ENDPOINTS.products}/${id}`, { method: 'DELETE' }); showToast('Product deleted'); loadProducts(); }
  catch(e) { showToast('Failed to delete', 'error'); }
}
init();
</script>
</body>
</html>
