<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Guna's Lathe Works</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="page-content" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
<div class="auth-card" style="max-width:420px;width:100%;">
  <div class="auth-logo"><h2>⚙ Guna's Lathe Works</h2><p>Admin Control Panel</p></div>
  <h2 class="auth-title">Administrator Login</h2>
  <p class="auth-subtitle">Access restricted to authorized personnel only</p>
  <form id="adminLoginForm">
    <div class="form-group">
      <label>Admin ID *</label>
      <input type="text" id="adminId" placeholder="Enter your Admin ID" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password *</label>
      <div class="password-toggle">
        <input type="password" id="adminPassword" placeholder="Enter admin password" required autocomplete="current-password">
        <span class="toggle-eye" onclick="togglePwd('adminPassword',this)">👁</span>
      </div>
    </div>
    <button type="submit" class="btn-auth-submit" id="loginBtn">Access Admin Panel</button>
  </form>
  <div style="margin-top:20px;padding:14px;background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.2);border-radius:var(--radius);font-size:12px;color:var(--text-muted);">
    🔐 Default → ID: <strong style="color:var(--accent);">Gunaadmin001</strong> | PW: <strong style="color:var(--accent);">Gunaadmin001</strong>
  </div>
  <div style="margin-top:16px;text-align:center;"><a href="../login.html" style="font-size:13px;color:var(--text-muted);">← Customer Login</a></div>
</div>
</div>
<script src="../config.js"></script>
<script>
function togglePwd(id, el) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  el.textContent = inp.type === 'password' ? '👁' : '🙈';
}
// Redirect if already admin
const user = getAuthUser();
if (user && user.role === 'admin') window.location.href = 'index.html';

document.getElementById('adminLoginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Authenticating...'; btn.disabled = true;
  try {
    const data = await apiRequest(API_ENDPOINTS.adminLogin, {
      method: 'POST',
      body: JSON.stringify({
        adminId: document.getElementById('adminId').value,
        password: document.getElementById('adminPassword').value
      })
    });
    localStorage.setItem('authToken', data.token);
    localStorage.setItem('userData', JSON.stringify(data.user));
    showToast('Admin access granted!');
    setTimeout(() => window.location.href = 'index.html', 800);
  } catch(e) {
    showToast(e.message || 'Invalid admin credentials', 'error');
    btn.textContent = 'Access Admin Panel'; btn.disabled = false;
  }
});
</script>
</body>
</html>
