<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Guna's Lathe Works</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="navbar">
  <div class="logo"><a href="index.html">⚙ Guna's Lathe Works</a></div>
  <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="products.html">Products</a></li></ul>
  <div class="auth-buttons"><div class="cart-icon-container" id="cartIcon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span id="cartCount" class="cart-count">0</span></div></div>
  <div class="hamburger"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
</nav>
<div class="page-content">
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><h2>⚙ Guna's Lathe Works</h2><p>Precision Machining & Fabrication</p></div>
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join us to order and track your products</p>
    <form id="signupForm">
      <div class="form-group"><label>Full Name *</label><input type="text" id="signupName" placeholder="Your full name" required></div>
      <div class="form-group"><label>Email Address *</label><input type="email" id="signupEmail" placeholder="Enter your email" required autocomplete="email"></div>
      <div class="form-group"><label>Phone Number</label><input type="tel" id="signupPhone" placeholder="+91 XXXXXXXXXX"></div>
      <div class="form-group">
        <label>Password * <span style="font-size:11px;color:var(--text-muted);">(min. 6 characters)</span></label>
        <div class="password-toggle">
          <input type="password" id="signupPassword" placeholder="Create a password" required autocomplete="new-password">
          <span class="toggle-eye" onclick="togglePwd('signupPassword',this)">👁</span>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password *</label>
        <div class="password-toggle">
          <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required>
          <span class="toggle-eye" onclick="togglePwd('signupConfirmPassword',this)">👁</span>
        </div>
      </div>
      <button type="submit" class="btn-auth-submit" id="signupBtn">Create Account</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="login.html">Sign In</a></div>
  </div>
</div>
</div>
<script src="config.js"></script>
<script>
function togglePwd(id, el) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  el.textContent = inp.type === 'password' ? '👁' : '🙈';
}
document.getElementById('signupForm').addEventListener('submit', async e => {
  e.preventDefault();
  const password = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirmPassword').value;
  if (password !== confirm) return showToast('Passwords do not match', 'error');
  if (password.length < 6) return showToast('Password must be at least 6 characters', 'error');
  const btn = document.getElementById('signupBtn');
  btn.textContent = 'Creating Account...'; btn.disabled = true;
  try {
    const data = await apiRequest(API_ENDPOINTS.signup, { method: 'POST', body: JSON.stringify({ name: document.getElementById('signupName').value, email: document.getElementById('signupEmail').value, phone: document.getElementById('signupPhone').value, password }) });
    localStorage.setItem('authToken', data.token);
    localStorage.setItem('userData', JSON.stringify(data.user));
    showToast("Account created! Welcome to Guna's Lathe Works!");
    setTimeout(() => window.location.href = 'index.html', 1000);
  } catch(e) {
    showToast(e.message || 'Signup failed', 'error');
    btn.textContent = 'Create Account'; btn.disabled = false;
  }
});
</script>
</body>
</html>
